name: Question
description: Ask a question about setup, usage, or behavior
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        For general questions, consider using [GitHub Discussions](../../discussions) instead — answers there help future users too.
  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: What have you tried?
